name: CI Pipeline

on:
  push:
    branches: [feature_p1]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Lint Check
        run: npm run lint || echo "No lint setup"
        
      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run type-check || echo "No TS"
